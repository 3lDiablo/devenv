apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controllers
  namespace: infrastructure
  labels:
    component: kafka-nodepool
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 1
  roles: [controller]
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi 
        deleteClaim: false 
        kraftMetadata: shared
