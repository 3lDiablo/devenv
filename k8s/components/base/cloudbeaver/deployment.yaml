apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  namespace: infrastructure
  labels:
    component: cloudbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
        component: cloudbeaver
    spec:
      containers:
      - name: cloudbeaver
        image: dbeaver/cloudbeaver:26.0.2
        ports:
        - containerPort: 8978
          name: http
        env: []
        volumeMounts:
        - name: global-connections-volume
          mountPath: /opt/cloudbeaver/workspace/GlobalConfiguration/.dbeaver/data-sources.json
          subPath: data-sources.json
      volumes:
      - name: global-connections-volume
        configMap:
          name: cloudbeaver-global-connections-config
