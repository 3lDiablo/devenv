# kafka-values.yaml
# This file contains the configuration values for the Bitnami Kafka Helm chart.
# The image repository and tag are injected at runtime by the Taskfile from the .env file.
# For a full list of options, see: https://github.com/bitnami/charts/tree/main/bitnami/kafka

# We're enabling KRaft mode, which simplifies the Kafka architecture by removing the need for Zookeeper.
kraft:
  enabled: true

controller:
  replicaCount: 1
  persistence:
    enabled: true
    size: 1Gi

broker:
  replicaCount: 1
  persistence:
    enabled: true
    size: 1Gi

# The service configuration for the Kafka brokers.
service:
  type: NodePort
  nodePorts:
    # This maps the 'external' listener to the NodePort we defined in kind-cluster.yaml.
    external: 30001

# The listeners configuration defines how clients connect to Kafka.
listeners:
  # The client listener is for internal cluster communication (e.g., service-to-service).
  client:
    protocol: PLAINTEXT
  # The external listener is for clients outside the Kubernetes cluster (i.e., your local machine).
  external:
    protocol: PLAINTEXT
    # This tells clients how to reach the broker from outside the cluster.
    # It must match the hostPort we defined in kind-cluster.yaml.
    advertised:
      listeners: "localhost:9094"

# --- Schema Registry ---
# Enables the Schema Registry, a critical component for managing Avro/Protobuf schemas.
# The Bitnami chart conveniently bundles it, simplifying our setup.
schemaRegistry:
  enabled: true
  service:
    type: NodePort
    # This maps the Schema Registry service to the NodePort we defined in kind-cluster.yaml.
    nodePort: 30002

# --- Kafka Connect ---
# Enables Kafka Connect, the framework for running source and sink connectors
# to move data between Kafka and other systems (databases, APIs, etc.).
connect:
  enabled: true
  service:
    type: NodePort
    # This maps the Kafka Connect service to the NodePort we defined in kind-cluster.yaml.
    nodePort: 30003

# We don't need Zookeeper in KRaft mode.
zookeeper:
  enabled: false
